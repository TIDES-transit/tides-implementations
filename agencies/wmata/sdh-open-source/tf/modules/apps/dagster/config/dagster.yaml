telemetry:
  enabled: false

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_db:
      hostname: { env: DAGSTER_POSTGRES_HOSTNAME }
      port: { env: DAGSTER_POSTGRES_PORT }
      username: { env: DAGSTER_POSTGRES_USER }
      password: { env: DAGSTER_POSTGRES_PASSWORD }
      db_name: { env: DAGSTER_POSTGRES_DB }

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_db:
      hostname: { env: DAGSTER_POSTGRES_HOSTNAME }
      port: { env: DAGSTER_POSTGRES_PORT }
      username: { env: DAGSTER_POSTGRES_USER }
      password: { env: DAGSTER_POSTGRES_PASSWORD }
      db_name: { env: DAGSTER_POSTGRES_DB }

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_db:
      hostname: { env: DAGSTER_POSTGRES_HOSTNAME }
      port: { env: DAGSTER_POSTGRES_PORT }
      username: { env: DAGSTER_POSTGRES_USER }
      password: { env: DAGSTER_POSTGRES_PASSWORD }
      db_name: { env: DAGSTER_POSTGRES_DB }

# Initially use DefaultRunLauncher (in-process)
# We'll implement ACA RunLauncher later
run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator

# Run monitoring doesn't currently succeed in detecting when a run fails to due OOM
# In such cases, the run is left permenantly running while output stops and it must be manually deleted
# Unclear if this is a configuration issue, or a consequence of executing our runs in the pipelines container and bringing it down at the same time
run_monitoring:
  enabled: true
  poll_interval_seconds: 10

concurrency:
  runs:
    max_concurrent_runs: 2
