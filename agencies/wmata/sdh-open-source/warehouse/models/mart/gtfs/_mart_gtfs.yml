                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: _feed_hash
        description: "{{ doc('field_gtfs__feed_hash') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: service_date
        description: "{{ doc('field_dim_dates_service_date') }}"
        data_tests:
          - not_null:
