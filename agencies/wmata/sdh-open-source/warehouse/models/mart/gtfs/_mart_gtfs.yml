        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: stop_code
        description: "{{ doc('field_gtfs_stop_code') }}"
      - name: stop_name
        description: "{{ doc('field_gtfs_stop_name') }}"
      - name: stop_sequence
        description: "{{ doc('field_gtfs_stop_sequence') }}"
        data_tests:
          - not_null:
