  - name: dim_patterns
    description: >
      Unique patterns derived from GTFS data with temporal validity. A pattern is a set of stop_ids in a sequence that will be visited on a trip.
      At [AGENCY], a pattern_id is based in part on the GTFS shape_id value that the pattern corresponds to.
      This model includes one record for each unique pattern in a given GTFS feed, along with the validity period of the source feed.
    columns:
      - *feed_hash
      - name: route_id
        description: "{{ doc('field_gtfs_route_id')}}"
      - name: pattern_id
        description: "{{ doc('field_gtfs_pattern_id')}}"
      - name: shape_id
        description: "{{ doc('field_gtfs_shape_id')}}"

  - name: dim_pattern_stops
    description: >
      Pattern stop sequences from GTFS data with temporal validity. A pattern is a set of stop_ids in a sequence that will be visited on a trip.
      At [AGENCY], a pattern_id is based in part on the GTFS shape_id value that the pattern corresponds to.
      This model includes one record for each stop in a pattern in a given GTFS feed, along with the validity period of the source feed.
      Patterns may have the same stop represented multiple times within a sequence, such as for a loop.
    columns:
      - *feed_hash
      - name: pattern_id
        description: "{{ doc('field_gtfs_pattern_id') }}"
      - name: stop_id
        description: "{{ doc('field_gtfs_stop_id') }}"
      - name: stop_sequence
        description: "{{ doc('field_gtfs_stop_sequence') }}"

  - name: dim_route_pattern_trips
    description: >
      Trip-to-pattern mapping from GTFS data. This model includes one record for each trip, its GTFS route_id,
      and the derived pattern_id in a given GTFS feed. A pattern is a set of stop_ids in a sequence that will
      be visited on a trip. At [AGENCY], a pattern_id is based in part on the GTFS shape_id value that the pattern corresponds to.
    columns:
      - name: _key
        description: "{{ doc('field_gtfs_route_pattern_trip') }}"
        data_tests:
          - unique:
              config:
                severity: warn
          - not_null:
              config:
                severity: warn
      - *feed_hash
      - name: route_id
        description: "{{ doc('field_gtfs_route_id') }}"
      - name: pattern_id
        description: "{{ doc('field_gtfs_pattern_id') }}"
      - name: shape_id
        description: "{{ doc('field_gtfs_shape_id') }}"
      - name: trip_id
        description: "{{ doc('field_gtfs_trip_id') }}"