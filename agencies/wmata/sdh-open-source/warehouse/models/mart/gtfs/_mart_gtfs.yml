      GTFS feed_info data, along with its versioned parent feed information.
      For official GTFS documentation, see: https://gtfs.org/documentation/schedule/reference/#feed_infotxt.
    columns:
      - <<: *feed_hash
        data_tests:
          - unique:
              config:
                severity: warn
      - name: feed_publisher_name
        description: "{{ doc('field_gtfs_feed_publisher_name') }}"
      - name: feed_publisher_url
        description: "{{ doc('field_gtfs_feed_publisher_url') }}"
      - name: feed_lang
        description: "{{ doc('field_gtfs_feed_lang') }}"
      - name: feed_start_date
        description: "{{ doc('field_gtfs_feed_start_date') }}"
      - name: feed_end_date
        description: "{{ doc('field_gtfs_feed_end_date') }}"
      - name: feed_version
        description: "{{ doc('field_gtfs_feed_version') }}"
      - name: feed_contact_email
        description: "{{ doc('field_gtfs_feed_contact_email') }}"
      - name: feed_contact_url
        description: "{{ doc('field_gtfs_feed_contact_url') }}"
  - name: dim_routes
    description: >
      GTFS routes data, along with its versioned parent feed information.
      For official GTFS documentation, see: https://gtfs.org/documentation/schedule/reference/#routestxt.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, `route_id`.
        data_tests:
          - unique:
              config:
                severity: warn
      - *feed_hash
