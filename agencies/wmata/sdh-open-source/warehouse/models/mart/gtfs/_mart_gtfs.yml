      - name: last_scheduled_departure_time
        description: "{{ doc('field_gtfs_last_scheduled_departure_time') }}"
      - name: _date_retrieved
        description: "{{ doc('field_gtfs_date_retrieved') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"

  - name: fct_scheduled_stop_times
    description: >
