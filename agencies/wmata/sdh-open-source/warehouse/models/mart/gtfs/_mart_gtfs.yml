version: 2

models:
  - name: dim_calendar_dates
    description: >
      GTFS calendar dates data, along with its versioned parent feed information.
      For official GTFS documentation, see: https://gtfs.org/documentation/schedule/reference/#calendar_datestxt.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, `service_id`, `date`, and `exception_type`.
        data_tests:
          - unique:
              config:
                severity: warn
      - &feed_hash
        name: _feed_hash
        description: "{{ doc('field_gtfs__feed_hash') }}"
      - name: service_id
        description: "{{ doc('field_gtfs_service_id') }}"
      - name: date
        description: "{{ doc('field_gtfs_date') }}"
      - name: exception_type
        description: "{{ doc('field_gtfs_exception_type') }}"
  - name: dim_calendar
    description: >
      GTFS calendar data, along with its versioned parent feed information.
      For official GTFS documentation, see: https://gtfs.org/documentation/schedule/reference/#calendartxt.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, and `service_id`.
        data_tests:
          - unique:
              config:
                severity: warn
      - *feed_hash
      - name: service_id
        description: "{{ doc('field_gtfs_service_id') }}"
      - name: monday
        description: "{{ doc('field_gtfs_monday') }}"
      - name: tuesday
        description: "{{ doc('field_gtfs_tuesday') }}"
      - name: wednesday
        description: "{{ doc('field_gtfs_wednesday') }}"
      - name: thursday
        description: "{{ doc('field_gtfs_thursday') }}"
      - name: friday
        description: "{{ doc('field_gtfs_friday') }}"
      - name: saturday
        description: "{{ doc('field_gtfs_saturday') }}"
      - name: sunday
        description: "{{ doc('field_gtfs_sunday') }}"
      - name: start_date
        description: "{{ doc('field_gtfs_start_date') }}"
      - name: end_date
        description: "{{ doc('field_gtfs_end_date') }}"
  - name: dim_feed_info
