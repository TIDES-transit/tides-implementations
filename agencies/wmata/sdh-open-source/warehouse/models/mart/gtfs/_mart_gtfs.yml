      - name: stop_sequence
        description: "{{ doc('field_gtfs_stop_sequence') }}"
      - name: stop_headsign
        description: "{{ doc('field_gtfs_stop_headsign') }}"
      - name: pickup_type
        description: "{{ doc('field_gtfs_pickup_type') }}"
      - name: drop_off_type
        description: "{{ doc('field_gtfs_drop_off_type') }}"
      - name: shape_dist_traveled
        description: "{{ doc('field_gtfs_shape_dist_traveled') }}"
      - name: timepoint
        description: "{{ doc('field_gtfs_timepoint') }}"
      - name: _date_retrieved
        description: "{{ doc('field_gtfs_date_retrieved') }}"
  - name: dim_trips
    description: >
      GTFS trips data, along with its versioned parent feed information.
      For official GTFS documentation, see: https://gtfs.org/documentation/schedule/reference/#tripstxt.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, and `trip_id`.
        data_tests:
          - unique:
              config:
                severity: warn
      - *feed_hash
      - name: route_id
        description: "{{ doc('field_gtfs_route_id') }}"
      - name: service_id
        description: "{{ doc('field_gtfs_service_id') }}"
      - name: trip_id
        description: "{{ doc('field_gtfs_trip_id') }}"
      - name: trip_headsign
        description: "{{ doc('field_gtfs_trip_headsign') }}"
      - name: direction_id
        description: "{{ doc('field_gtfs_direction_id') }}"
      - name: block_id
        description: "{{ doc('field_gtfs_block_id') }}"
      - name: shape_id
        description: "{{ doc('field_gtfs_shape_id') }}"
  - name: dim_schedule_feeds
    description: >
      Metadata about GTFS feeds and their validity periods.
    config:
      event_time: _date_retrieved
    data_tests:
      - dbt_utils.mutually_exclusive_ranges:
          arguments:
            lower_bound_column: _valid_from
            upper_bound_column: _valid_to
            partition_by: _feed_type
            gaps: allowed
          config:
            severity: warn
    columns:
      - <<: *feed_hash
        data_tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn
      - name: _source
        description: "{{ doc('field_gtfs_source') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: _feed_type
        description: "{{ doc('field_gtfs_feed_type') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              arguments:
                values: ["Combined", "Rail", "Bus"]
              config:
                severity: warn
      - name: _date_retrieved
        description: "{{ doc('field_gtfs_date_retrieved') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: feed_version
        description: "{{ doc('field_gtfs_feed_version') }}"
      - name: feed_start_date
        description: "{{ doc('field_gtfs_feed_start_date') }}"
      - name: feed_end_date
        description: "{{ doc('field_gtfs_feed_end_date') }}"
      - name: _valid_from
        description: "{{ doc('field_gtfs_valid_from') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: _valid_to
        description: "{{ doc('field_gtfs_valid_to') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
  - name: dim_shapes
    description: Staging model for gtfs shapes table.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, `shape_id`, and `shape_pt_sequence`.
        data_tests:
          - unique:
              config:
                severity: warn
