      - name: shape_pt_sequence
        description: "{{ doc('field_gtfs_shape_pt_sequence') }}"
      - name: shape_dist_traveled
        description: "{{ doc('field_gtfs_shape_dist_traveled') }}"

  - name: dim_gtfs_timepoints
    description: |
      [AGENCY] GTFS timepoint_times table. Non-standard table published by [AGENCY].
      A timepoint is a timing point that's associated with one or more stops in different direction that has a
      actual passing time generated by the scheduling system. Typically an intersection or major landmark.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, and `stop_id`.
        data_tests:
          - unique:
              config:
                severity: warn
      - *feed_hash
      - name: stop_id
        description: "{{ doc('field_gtfs_stop_id') }}"
      - name: stop_code
        description: "{{ doc('field_gtfs_stop_code') }}"
      - name: stop_name
        description: "{{ doc('field_gtfs_stop_name') }}"
      - name: stop_desc
        description: "{{ doc('field_gtfs_stop_desc') }}"
      - name: stop_lat
        description: "{{ doc('field_gtfs_stop_lat') }}"
      - name: stop_lon
        description: "{{ doc('field_gtfs_stop_lon') }}"
      - name: zone_id
        description: "{{ doc('field_gtfs_zone_id') }}"
      - name: stop_url
        description: "{{ doc('field_gtfs_stop_url') }}"

  - name: dim_gtfs_timepoint_times
    description: |
      [AGENCY] GTFS timepoint_times table. Non-standard table published by [AGENCY].
      A timepoint is a timing point that's associated with one or more stops in different direction that has a
      actual passing time generated by the scheduling system. Typically an intersection or major landmark.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `_feed_hash`, `trip_id`, and `stop_sequence`.
        data_tests:
          - unique:
              config:
                severity: warn
      - *feed_hash
      - name: trip_id
        description: "{{ doc('field_gtfs_trip_id') }}"
      - name: arrival_time
        description: "{{ doc('field_gtfs_arrival_time') }}"
      - name: departure_time
        description: "{{ doc('field_gtfs_departure_time') }}"
      - name: arrival_time_secs
        description: "{{ doc('field_gtfs_arrival_time_secs') }}"
      - name: departure_time_secs
        description: "{{ doc('field_gtfs_departure_time_secs') }}"
      - name: stop_id
        description: "{{ doc('field_gtfs_stop_id') }}"
      - name: stop_sequence
        description: "{{ doc('field_gtfs_stop_sequence') }}"
      - name: stop_headsign
        description: "{{ doc('field_gtfs_stop_headsign') }}"
      - name: pickup_type
        description: "{{ doc('field_gtfs_pickup_type') }}"
      - name: drop_off_type
        description: "{{ doc('field_gtfs_drop_off_type') }}"
      - name: shape_dist_traveled
        description: "{{ doc('field_gtfs_shape_dist_traveled') }}"
      - name: timepoint
        description: "{{ doc('field_gtfs_timepoint') }}"

  - name: dim_dates
    description: "Dimension table containing all dates from 2018-2030 with calendar attributes"
    columns:
      - name: service_date
        description: "{{ doc('field_dim_dates_service_date') }}"
        data_tests:
          - unique:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: year_of_date
        description: "{{ doc('field_dim_dates_year_of_date') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: month_of_year
        description: "{{ doc('field_dim_dates_month_of_year') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 12
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: day_of_month
        description: "{{ doc('field_dim_dates_day_of_month') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 31
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: day_of_year
        description: "{{ doc('field_dim_dates_day_of_year') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 366
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: day_of_week
        description: "{{ doc('field_dim_dates_day_of_week') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - accepted_values:
              arguments:
                values:
                  [
                    "Monday",
                    "Tuesday",
                    "Wednesday",
                    "Thursday",
                    "Friday",
                    "Saturday",
                    "Sunday",
                  ]
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: weekday_weekend
        description: "{{ doc('field_dim_dates_weekday_weekend') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - accepted_values:
              arguments:
                values: ["Weekday", "Weekend"]

              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
  - name: fct_daily_schedule_feed_modes
    description: >
      Fact table identifying which GTFS feed is applicable for each service date by transit mode.
      Combined feeds are expanded into separate Bus and Rail rows, and each mode gets its own
      effective validity window based on when the feed actually has active service for that mode.
      A feed's validity for a mode extends until the next feed can serve that mode, ensuring
      continuity when a newer feed's service_ids for one mode start later than the feed's
      retrieval date. Among eligible feeds, the most recently retrieved is selected.
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `service_date`, and `feed_mode`.
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - unique:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: service_date
        description: "{{ doc('field_daily_schedule_feeds_service_date') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: feed_mode
        description: "{{ doc('field_gtfs_feed_mode') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - accepted_values:
              arguments:
                values: ["Bus", "Rail"]
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: feed_type
        description: "{{ doc('field_gtfs_feed_type') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - accepted_values:
              arguments:
                values: ["Combined", "Rail", "Bus"]
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - <<: *feed_hash
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
  - name: fct_scheduled_trips
    description: >
      One record for each trip operated on a service date. Only service dates up to the current
