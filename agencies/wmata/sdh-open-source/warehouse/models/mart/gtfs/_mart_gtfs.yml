                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: service_date
        description: "{{ doc('field_dim_dates_service_date') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: _feed_hash
        description: "{{ doc('field_gtfs__feed_hash') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: service_id
        description: "{{ doc('field_gtfs_service_id') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: trip_id
        description: "{{ doc('field_gtfs_trip_id') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: direction_id
        description: "{{ doc('field_gtfs_direction_id') }}"
      - name: block_id
        description: "{{ doc('field_gtfs_block_id') }}"
      - name: shape_id
        description: "{{ doc('field_gtfs_shape_id') }}"
      - name: route_id
        description: "{{ doc('field_gtfs_route_id') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: trip_mode
        description: "{{ doc('field_gtfs_trip_mode') }}"
      - name: route_type
        description: "{{ doc('field_gtfs_route_type') }}"
      - name: route_short_name
        description: "{{ doc('field_gtfs_route_short_name') }}"
      - name: route_long_name
        description: "{{ doc('field_gtfs_route_long_name') }}"
      - name: num_distinct_stops_serviced
        description: "{{ doc('field_gtfs_num_distinct_stops_serviced') }}"
      - name: num_scheduled_stops
        description: "{{ doc('field_gtfs_num_scheduled_stops') }}"
      - name: first_scheduled_stop_id
        description: "{{ doc('field_gtfs_first_scheduled_stop_id') }}"
      - name: last_scheduled_stop_id
