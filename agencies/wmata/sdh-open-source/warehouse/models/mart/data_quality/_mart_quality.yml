version: 2

models:
  - name: fct_tides_fare_transactions_fare_quality
    description: >
      "Fare transactions from FARE data sources (FARE_SALE and FARE_USE), annotated with columns describing data quality issues.
      This model focuses exclusively on FARE data in alignment with the TIDES schema modification proposal by [AGENCY]."
    data_tests:
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('int_tides_fare_transactions_fare')
          config:
            severity: warn
            meta:
              dagster:
                asset_key: ["fct_tides_fare_transactions_fare_quality"]
    columns:
      - name: _row_id
        description: "{{ doc('field_row_id') }}"
        data_tests:
          - unique:
              config:
                # Oracle ROWID issues spotted in Trino, downgrading, see #788.
                severity: warn
      - name: row_hash
        description: "{{ doc('field_row_hash') }}"
      - name: is_valid
        description: "{{ doc('field_is_valid') }}"
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "= true"
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: dup_row_to_keep
        description: "{{ doc('field_dup_row_to_keep') }}"
      - name: has_duplicates
        description: "{{ doc('field_has_duplicates') }}"
