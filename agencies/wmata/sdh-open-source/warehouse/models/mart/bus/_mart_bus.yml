version: 2

models:
  - name: fct_tides_stop_visits_bus
    description: "Summarized boarding, alighting, arrival, departure, and other events (kneel engaged, ramp deployed, etc.) by trip and stop for each service date."
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `service_date`, `trip_id_performed`, and `trip_stop_sequence`.
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
