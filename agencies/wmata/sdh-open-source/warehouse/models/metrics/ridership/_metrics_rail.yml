        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: time_period_category
        description: "{{ doc('field_station_activities_time_period_category') }}"
      - name: total_entries
        description: "{{ doc('field_station_activities_total_entries') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                severity: warn
