version: 2

models:
  - name: metric_hourly_station_ridership
    description: "Hourly rail ridership summary by station, reshaping fct_tides_station_activities into the metrics layer with a consistent interface."
    columns:
      - name: _key
        description: |
          Synthetic primary key constructed from `service_date`, `stop_id`, `time_period_start`.
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
          - unique:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: service_date
        description: "{{ doc('field_station_activities_service_date') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: stop_id
        description: "{{ doc('field_station_activities_stop_id') }}"
        data_tests:
          - not_null:
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
      - name: time_period_start
        description: "{{ doc('field_station_activities_time_period_start') }}"
