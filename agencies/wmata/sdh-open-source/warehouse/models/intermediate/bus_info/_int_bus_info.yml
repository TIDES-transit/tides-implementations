version: 2

models:
  - name: int_tides_stop_visits_bus_info
    description: "Intermediate model (i.e., without data quality filters) with summarized boarding, alighting, arrival, departure, and other events (kneel engaged, ramp deployed, etc.) by trip and stop for each service date."
    columns:
      - name: _row_id
        description: "{{ doc('field_row_id') }}"
      - name: service_date
        description: "{{ doc('field_stop_visits_service_date') }}"
      - name: trip_id_performed
        description: "{{ doc('field_stop_visits_trip_id_performed') }}"
      - name: trip_stop_sequence
        description: "{{ doc('field_stop_visits_trip_stop_sequence') }}"
      - name: scheduled_stop_sequence
        description: "{{ doc('field_stop_visits_scheduled_stop_sequence') }}"
      - name: pattern_id
        description: "{{ doc('field_stop_visits_pattern_id') }}"
      - name: vehicle_id
        description: "{{ doc('field_stop_visits_vehicle_id') }}"
      - name: dwell
        description: "{{ doc('field_stop_visits_dwell') }}"
      - name: stop_id
        description: "{{ doc('field_stop_visits_stop_id') }}"
      - name: timepoint
        description: "{{ doc('field_stop_visits_timepoint') }}"
      - name: schedule_arrival_time
        description: "{{ doc('field_stop_visits_schedule_arrival_time') }}"
      - name: schedule_departure_time
        description: "{{ doc('field_stop_visits_schedule_departure_time') }}"
      - name: actual_arrival_time
        description: "{{ doc('field_stop_visits_actual_arrival_time') }}"
      - name: actual_departure_time
        description: "{{ doc('field_stop_visits_actual_departure_time') }}"
      - name: distance
        description: "{{ doc('field_stop_visits_distance') }}"
      - name: boarding_1
        description: "{{ doc('field_stop_visits_boarding_1') }}"
      - name: alighting_1
        description: "{{ doc('field_stop_visits_alighting_1') }}"
      - name: boarding_2
        description: "{{ doc('field_stop_visits_boarding_2') }}"
      - name: alighting_2
        description: "{{ doc('field_stop_visits_alighting_2') }}"
      - name: departure_load
        description: "{{ doc('field_stop_visits_departure_load') }}"
      - name: door_open
        description: "{{ doc('field_stop_visits_door_open') }}"
      - name: door_close
        description: "{{ doc('field_stop_visits_door_close') }}"
      - name: door_status
        description: "{{ doc('field_stop_visits_door_status') }}"
      - name: ramp_deployed_time
        description: "{{ doc('field_stop_visits_ramp_deployed_time') }}"
      - name: ramp_failure
        description: "{{ doc('field_stop_visits_ramp_failure') }}"
      - name: kneel_deployed_time
        description: "{{ doc('field_stop_visits_kneel_deployed_time') }}"
      - name: lift_deployed_time
        description: "{{ doc('field_stop_visits_lift_deployed_time') }}"
      - name: bike_rack_deployed
        description: "{{ doc('field_stop_visits_bike_rack_deployed') }}"
      - name: bike_load
        description: "{{ doc('field_stop_visits_bike_load') }}"
      - name: revenue
        description: "{{ doc('field_stop_visits_revenue') }}"
      - name: number_of_transactions
        description: "{{ doc('field_stop_visits_number_of_transactions') }}"
      - name: schedule_relationship
        description: "{{ doc('field_stop_visits_schedule_relationship') }}"
      - name: custom_ramp_deployed_count
        description: "{{ doc('field_stop_visits_custom_ramp_deployed_count') }}"
      - name: dwell_imputed
        description: "{{ doc('field_stop_visits_dwell_imputed') }}"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                severity: warn
                where: "service_date >= current_date - interval '3' day"
  - name: int_tides_stop_visits_bus_info_grouped
